<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{nom}}</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & base ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 210mm;
      background: #ffffff;
      color: #1a1a1a;
      font-family: 'DM Mono', 'Courier New', monospace;
      font-size: 8.5pt;
      line-height: 1.5;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* ─── Page shell ────────────────────────────────────────────── */
    .page {
      width: 210mm;
      min-height: 297mm;
      padding: 10mm 11mm 10mm 11mm;
      background: #ffffff;
      display: flex;
      flex-direction: column;
    }

    /* ─── Top banner ─────────────────────────────────────────────── */
    .top-banner {
      background: #1a1a1a;
      color: #ffffff;
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: stretch;
      margin-bottom: 0;
    }

    .banner-left {
      flex: 1;
      padding-right: 16px;
    }

    .banner-label {
      font-size: 6.5pt;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #888888;
      margin-bottom: 3px;
    }

    .banner-title {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 20pt;
      font-weight: 400;
      color: #ffffff;
      line-height: 1.1;
      letter-spacing: -0.01em;
    }

    .banner-tags {
      margin-top: 5px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .tag {
      display: inline-block;
      background: #333333;
      border: 1px solid #444444;
      color: #aaaaaa;
      font-size: 6.5pt;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 1px 7px;
      border-radius: 1px;
    }

    .banner-right {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f0c040;
      color: #1a1a1a;
      padding: 8px 16px;
      min-width: 80px;
      text-align: center;
    }

    .masse-label {
      font-size: 6pt;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #4a3a00;
      font-weight: 500;
      margin-bottom: 2px;
    }

    .masse-value {
      font-family: 'DM Mono', monospace;
      font-size: 18pt;
      font-weight: 500;
      line-height: 1.0;
      color: #1a1a1a;
    }

    .masse-unit {
      font-size: 7pt;
      color: #4a3a00;
      letter-spacing: 0.08em;
    }

    /* ─── Info grid ──────────────────────────────────────────────── */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      border-left: 1px solid #1a1a1a;
      border-right: 1px solid #1a1a1a;
      border-bottom: 1px solid #1a1a1a;
      margin-bottom: 0;
    }

    .info-cell {
      padding: 5px 8px;
      border-right: 1px solid #dddddd;
    }

    .info-cell:last-child {
      border-right: none;
    }

    .info-cell-label {
      font-size: 6pt;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #999999;
      margin-bottom: 2px;
    }

    .info-cell-value {
      font-size: 8pt;
      color: #1a1a1a;
      font-weight: 500;
    }

    /* ─── Section header bar ─────────────────────────────────────── */
    .section-bar {
      background: #f0f0f0;
      border-left: 1px solid #1a1a1a;
      border-right: 1px solid #1a1a1a;
      border-top: 1px solid #cccccc;
      border-bottom: 1px solid #cccccc;
      padding: 3px 8px;
      font-size: 6.5pt;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #333333;
      font-weight: 500;
      margin-top: 8px;
    }

    /* ─── Main table ─────────────────────────────────────────────── */
    .main-body {
      display: flex;
      gap: 0;
      flex: 1;
      border-left: 1px solid #1a1a1a;
      border-right: 1px solid #1a1a1a;
      border-bottom: 1px solid #1a1a1a;
    }

    /* ─── Ingredients dense table ────────────────────────────────── */
    .ingredients-col {
      width: 42%;
      border-right: 1px solid #cccccc;
    }

    .ingredients-col .section-bar {
      border-left: none;
      border-right: none;
      border-top: none;
      margin-top: 0;
    }

    table.ing-table {
      width: 100%;
      border-collapse: collapse;
    }

    table.ing-table thead tr {
      background: #f8f8f8;
      border-bottom: 1px solid #dddddd;
    }

    table.ing-table thead th {
      padding: 3px 6px;
      font-size: 6pt;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888888;
      text-align: left;
      font-weight: 500;
    }

    table.ing-table thead th.th-qty { width: 44px; }
    table.ing-table thead th.th-unit { width: 28px; }

    table.ing-table tbody tr {
      border-bottom: 1px solid #f2f2f2;
    }

    table.ing-table tbody tr:last-child {
      border-bottom: none;
    }

    table.ing-table tbody tr:nth-child(even) {
      background: #fafafa;
    }

    table.ing-table tbody td {
      padding: 4px 6px;
      vertical-align: top;
      font-size: 8pt;
      line-height: 1.3;
      color: #1a1a1a;
    }

    table.ing-table tbody td.td-qty {
      color: #555555;
      font-size: 7.5pt;
      white-space: nowrap;
      text-align: right;
      padding-right: 4px;
    }

    table.ing-table tbody td.td-unit {
      color: #888888;
      font-size: 7pt;
    }

    /* ─── Steps col ──────────────────────────────────────────────── */
    .steps-col {
      flex: 1;
      padding: 8px 10px;
    }

    .step {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid #f2f2f2;
    }

    .step:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .step-num {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      background: #1a1a1a;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 7pt;
      font-weight: 500;
      border-radius: 50%;
      margin-top: 1px;
    }

    .step-text {
      flex: 1;
      font-size: 8.5pt;
      line-height: 1.55;
      color: #222222;
    }

    /* ─── Notes + source row ─────────────────────────────────────── */
    .bottom-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-left: 1px solid #1a1a1a;
      border-right: 1px solid #1a1a1a;
      border-bottom: 1px solid #1a1a1a;
      margin-top: 8px;
    }

    .bottom-cell {
      padding: 7px 10px;
      border-right: 1px solid #dddddd;
    }

    .bottom-cell:last-child {
      border-right: none;
    }

    .bottom-cell-label {
      font-size: 6pt;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #999999;
      margin-bottom: 4px;
    }

    .bottom-cell-text {
      font-size: 8pt;
      color: #333333;
      line-height: 1.5;
    }

    /* ─── Footer ─────────────────────────────────────────────────── */
    .footer {
      margin-top: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
    }

    .footer-brand {
      font-family: 'DM Serif Display', serif;
      font-size: 8pt;
      color: #cccccc;
    }

    .footer-date {
      font-family: 'DM Mono', monospace;
      font-size: 6.5pt;
      color: #bbbbbb;
      letter-spacing: 0.08em;
    }

    /* ─── Print ──────────────────────────────────────────────────── */
    @media print {
      html, body { background: #ffffff; }
      .page { page-break-after: always; }
      .page:last-child { page-break-after: avoid; }
    }

    @page {
      size: A4;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- Top banner : titre + masse totale -->
    <div class="top-banner">
      <div class="banner-left">
        <div class="banner-label">Fiche Technique — RecipeLog</div>
        <div class="banner-title">{{nom}}</div>
        <div class="banner-tags">{{tags}}</div>
      </div>
      <div class="banner-right">
        <div class="masse-label">Masse totale</div>
        <div class="masse-value">{{masse_totale}}</div>
        <div class="masse-unit">grammes</div>
      </div>
    </div>

    <!-- Info grid : date, source -->
    <div class="info-grid">
      <div class="info-cell">
        <div class="info-cell-label">Date</div>
        <div class="info-cell-value">{{date}}</div>
      </div>
      <div class="info-cell">
        <div class="info-cell-label">Source</div>
        <div class="info-cell-value">{{source}}</div>
      </div>
      <div class="info-cell">
        <div class="info-cell-label">Rendement</div>
        <div class="info-cell-value">—</div>
      </div>
      <div class="info-cell">
        <div class="info-cell-label">Coût unitaire</div>
        <div class="info-cell-value">—</div>
      </div>
    </div>

    <!-- Section bar -->
    <div class="section-bar">Composition &amp; Méthode</div>

    <!-- Main body : ingrédients | étapes -->
    <div class="main-body">

      <!-- Ingredients -->
      <div class="ingredients-col">
        <table class="ing-table">
          <thead>
            <tr>
              <th class="th-qty">Qté</th>
              <th class="th-unit">U.</th>
              <th>Ingrédient</th>
            </tr>
          </thead>
          <tbody>
            {{ingredients}}
          </tbody>
        </table>
      </div>

      <!-- Steps -->
      <div class="steps-col">
        <div class="steps-container">
          {{etapes}}
        </div>
      </div>

    </div>

    <!-- Bottom row : notes + observations -->
    <div class="bottom-row">
      <div class="bottom-cell">
        <div class="bottom-cell-label">Notes &amp; observations</div>
        <div class="bottom-cell-text">{{notes}}</div>
      </div>
      <div class="bottom-cell">
        <div class="bottom-cell-label">Validation / Visa</div>
        <div class="bottom-cell-text" style="color:#cccccc; font-style:italic;">—</div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span class="footer-brand">RecipeLog</span>
      <span class="footer-date">Imprimé le {{date}}</span>
    </footer>

  </div>
</body>
</html>
