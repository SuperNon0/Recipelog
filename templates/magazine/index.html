<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{nom}} — RecipeLog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ─── Reset & base ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 210mm;
      background: #ffffff;
      color: #111111;
      font-family: 'DM Mono', 'Courier New', monospace;
      font-size: 9.5pt;
      line-height: 1.6;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* ─── Page shell ────────────────────────────────────────────── */
    .page {
      width: 210mm;
      min-height: 297mm;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* ─── Hero / Photo zone ──────────────────────────────────────── */
    .hero {
      width: 100%;
      height: 72mm;
      background: #f0f0ee;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* Si une vraie image est injectée via style inline sur .hero */
    .hero-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* Placeholder quand pas de photo */
    .hero-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .hero-placeholder-icon {
      width: 36px;
      height: 36px;
      opacity: 0.25;
    }

    .hero-placeholder-text {
      font-family: 'DM Mono', monospace;
      font-size: 7pt;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #bbbbbb;
    }

    /* Overlay gradient au bas du hero pour lisibilité du titre */
    .hero-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40mm;
      background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.55) 100%);
    }

    /* Bandeau rubrique en haut du hero */
    .hero-rubrique {
      position: absolute;
      top: 12px;
      left: 14mm;
      font-family: 'DM Mono', monospace;
      font-size: 6.5pt;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      background: rgba(0,0,0,0.3);
      padding: 3px 10px;
      border-radius: 2px;
    }

    /* Titre positionné sur le hero (bas) */
    .hero-title-block {
      position: absolute;
      bottom: 12px;
      left: 14mm;
      right: 14mm;
    }

    .recipe-title {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 34pt;
      font-weight: 400;
      line-height: 1.0;
      color: #ffffff;
      letter-spacing: -0.02em;
      text-shadow: 0 2px 12px rgba(0,0,0,0.4);
      margin-bottom: 6px;
    }

    .hero-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .tag {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 6.5pt;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
      border: 1px solid rgba(255,255,255,0.45);
      padding: 2px 8px;
      border-radius: 2px;
      background: rgba(0,0,0,0.2);
    }

    /* ─── Sous-header : masse + source ──────────────────────────── */
    .sub-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5mm 14mm 4mm;
      border-bottom: 1px solid #eeeeee;
      flex-shrink: 0;
    }

    .sub-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .masse-block {
      display: flex;
      align-items: baseline;
      gap: 5px;
    }

    .masse-label {
      font-family: 'DM Mono', monospace;
      font-size: 7pt;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #aaaaaa;
    }

    .masse-value {
      font-family: 'DM Mono', monospace;
      font-size: 13pt;
      font-weight: 500;
      color: #111111;
    }

    .masse-unit {
      font-family: 'DM Mono', monospace;
      font-size: 8pt;
      color: #888888;
    }

    .divider-dot {
      width: 3px;
      height: 3px;
      background: #cccccc;
      border-radius: 50%;
    }

    .source-line {
      font-family: 'DM Mono', monospace;
      font-size: 7.5pt;
      color: #aaaaaa;
    }

    .source-line span {
      color: #555555;
    }

    .sub-right {
      font-family: 'DM Mono', monospace;
      font-size: 7.5pt;
      color: #cccccc;
      letter-spacing: 0.06em;
    }

    /* ─── Body 2-col ─────────────────────────────────────────────── */
    .body-cols {
      display: flex;
      flex: 1;
      padding: 6mm 14mm 0;
      gap: 10mm;
    }

    /* ─── Section label ──────────────────────────────────────────── */
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 7pt;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #bbbbbb;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid #f0f0f0;
    }

    /* ─── Left col : ingrédients ─────────────────────────────────── */
    .col-left {
      width: 70mm;
      flex-shrink: 0;
      padding-right: 10mm;
      border-right: 1px solid #eeeeee;
    }

    .ingredients-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'DM Mono', monospace;
    }

    .ingredients-table tr {
      border-bottom: 1px solid #f5f5f5;
    }

    .ingredients-table tr:last-child {
      border-bottom: none;
    }

    .ingredients-table td {
      padding: 4px 0;
      vertical-align: top;
      font-size: 8.5pt;
      line-height: 1.35;
    }

    .ingredients-table td.qty {
      width: 44px;
      color: #888888;
      font-size: 8pt;
      white-space: nowrap;
      padding-right: 6px;
    }

    .ingredients-table td.unit {
      width: 28px;
      color: #bbbbbb;
      font-size: 7.5pt;
      padding-right: 8px;
    }

    .ingredients-table td.name {
      color: #222222;
    }

    .masse-total-row {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 2px solid #111111;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .masse-total-label {
      font-family: 'DM Mono', monospace;
      font-size: 7pt;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888888;
    }

    .masse-total-value {
      font-family: 'DM Mono', monospace;
      font-size: 10pt;
      font-weight: 500;
      color: #111111;
    }

    /* ─── Right col : étapes ─────────────────────────────────────── */
    .col-right {
      flex: 1;
    }

    .step {
      display: flex;
      gap: 12px;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid #f5f5f5;
    }

    .step:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .step-num {
      flex-shrink: 0;
      font-family: 'DM Serif Display', serif;
      font-size: 20pt;
      color: #eeeeee;
      line-height: 1.1;
      width: 24px;
      text-align: right;
    }

    .step-text {
      flex: 1;
      color: #333333;
      font-size: 9pt;
      line-height: 1.65;
      padding-top: 3px;
    }

    /* ─── Notes ──────────────────────────────────────────────────── */
    .notes-block {
      margin: 4mm 14mm 0;
      padding: 4mm;
      background: #fafafa;
      border-top: 1px solid #eeeeee;
    }

    .notes-text {
      color: #777777;
      font-size: 8.5pt;
      line-height: 1.6;
      font-style: italic;
    }

    /* ─── Footer ─────────────────────────────────────────────────── */
    .footer {
      padding: 4mm 14mm 5mm;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }

    .footer-brand {
      font-family: 'DM Serif Display', serif;
      font-size: 9pt;
      color: #dddddd;
      font-style: italic;
    }

    .footer-date {
      font-family: 'DM Mono', monospace;
      font-size: 7pt;
      color: #cccccc;
      letter-spacing: 0.06em;
    }

    /* ─── Print ──────────────────────────────────────────────────── */
    @media print {
      html, body { background: #ffffff; }
      .page { page-break-after: always; }
      .page:last-child { page-break-after: avoid; }
    }

    @page {
      size: A4;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- Hero : zone photo pleine largeur -->
    <div class="hero">
      <!-- Fond : image injectée via attribut data-photo ou placeholder -->
      <div class="hero-bg" id="heroBg"></div>

      <!-- Placeholder SVG affiché si pas de photo -->
      <div class="hero-placeholder" id="heroPlaceholder">
        <svg class="hero-placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="#999999" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <span class="hero-placeholder-text">Photo</span>
      </div>

      <!-- Overlay gradient -->
      <div class="hero-overlay"></div>

      <!-- Rubrique -->
      <div class="hero-rubrique">RecipeLog — Recette</div>

      <!-- Titre sur le hero -->
      <div class="hero-title-block">
        <h1 class="recipe-title">{{nom}}</h1>
        <div class="hero-tags">{{tags}}</div>
      </div>
    </div>

    <!-- Sous-header : masse + source + date -->
    <div class="sub-header">
      <div class="sub-left">
        <div class="masse-block">
          <span class="masse-label">Masse totale</span>
          <span class="masse-value">{{masse_totale}}</span>
          <span class="masse-unit">g</span>
        </div>
        <div class="divider-dot"></div>
        <div class="source-line">Source&nbsp;: <span>{{source}}</span></div>
      </div>
      <div class="sub-right">{{date}}</div>
    </div>

    <!-- Corps : 2 colonnes -->
    <div class="body-cols">

      <!-- Ingrédients -->
      <div class="col-left">
        <div class="section-label">Ingrédients</div>
        <table class="ingredients-table">
          <tbody>
            {{ingredients}}
          </tbody>
        </table>
        <div class="masse-total-row">
          <span class="masse-total-label">Total</span>
          <span class="masse-total-value">{{masse_totale}} g</span>
        </div>
      </div>

      <!-- Étapes -->
      <div class="col-right">
        <div class="section-label">Préparation</div>
        <div class="steps-container">
          {{etapes}}
        </div>
      </div>

    </div>

    <!-- Notes -->
    <div class="notes-block">
      <div class="section-label" style="border-bottom:none; padding-bottom:4px; margin-bottom:6px;">Notes</div>
      <div class="notes-text">{{notes}}</div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span class="footer-brand">RecipeLog</span>
      <span class="footer-date">{{date}}</span>
    </footer>

  </div>
</body>
</html>
